services:
  backend:
    build:
      context: ./backend
      args:
        - INSTALL_MODE=gpu # <--- Overrides the default 'cpu'
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    volumes:
      - ./frontend:/app
      - /app/node_modules # Protects container's modules
    environment:
      - CHOKIDAR_USEPOLLING=true # Windows file-watch fix
