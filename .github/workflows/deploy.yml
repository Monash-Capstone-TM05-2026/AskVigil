name: Deploy to Oracle Cloud
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/AskVigil
            # If it's the very first time, the robot might need to clone
            if [ ! -d ".git" ]; then
              git init
              git remote add origin https://github.com/${{ github.repository }}.git
              git fetch
              git checkout -f main
            else
              git pull origin main
            fi
            # Force Docker to ONLY use the base file, ignoring the local GPU override
            docker compose -f docker-compose.yml up -d --build
