name: Deploy to Oracle Cloud
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/AskVigil
            # If it's the very first time, the robot might need to clone
            if [ ! -d ".git" ]; then
              git clone https://github.com/Monash-Capstone-TM05-2026/AskVigil.git .
            else
              git pull origin main
            fi
            # Fire up the containers
            docker-compose up -d --build
